  *   🔥 **Spotify Downloader**: Rips entire playlists faster than you can say "Premium".
  *   ☁️ **SoundCloud Support**: Snags those underground sets that aren't on main.
  *   🎥 **YouTube Extraction**: Smart filtering to avoid those "10 Hours of Silence" videos.
  *   🎨 **Aesthetic UI**: Glassmorphism + Monochrome themes (Orange/Red/Green) because we have taste.
  *   🏷️ **Auto-Tagging**: Your library won't look like a mess anymore.
  *   🛡️ **Privacy Focused**: Your credentials stay on your machine. **Nothing is sent to our servers (cause there are no servers).**

