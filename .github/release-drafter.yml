  ## ⚙️ Setup Guide (For the Spotify Girlies)
  <details>
  <summary><strong>🟢 Click to reveal (Spotify Setup)</strong></summary>

  ### 1. Create a Spotify App
  1.  Go to [Spotify Developer Dashboard](https://developer.spotify.com/dashboard).
  2.  Create App -> Name it `MyMusicApp`.
  3.  Redirect URI: `http://localhost:3000`.

  ### 2. Enter in App
  1.  Copy Client ID/Secret.
  2.  Paste it in the app's Spotify View sidebar.
  </details>

